databases:
  - name: 818-automation-db
    databaseName: automation_818
    user: automation_818_user
    plan: free

services:
  - type: web
    name: 818-automation-api
    runtime: node
    plan: free
    buildCommand: npm install -g pnpm && pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: 818-automation-db
          property: connectionString

  - type: web
    name: 818-automation-frontend
    runtime: static
    plan: free
    buildCommand: npm install -g pnpm && pnpm install && BASE_PATH=/ pnpm --filter @workspace/818-automation run build
    staticPublishPath: artifacts/818-automation/dist/public
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
